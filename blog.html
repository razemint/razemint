---
layout: default
---

<h1>Blog</h1>

<ul>
    {% for blog in site.posts %}
    <!--limit: n-->
    <li>
        <a class="title" href="{{ site.baseurl }}{{ blog.url }}">{{ blog.title }}</a>
        <p class="meta"> {{ blog.meta }} </p>
        <p class="category"> {{ blog.category }} </p>
    </li>
    {% endfor %}
</ul>
